---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-backup
spec:
  storageClassName: nfs-backup
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.167.5
    path: /mnt/SG6TB2/benji

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-nfs-backup
  namespace: backup-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi
  storageClassName: nfs-backup